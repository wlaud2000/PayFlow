spring:
  config:
    import: classpath:/yaml/
  profiles:
    group:
      logging-dev: dev, log
      logging-local: local, log
      logging-test: test, log
    active: ${SPRING_PROFILES_ACTIVE:local}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

management:
  server:
    port: 8081
  # [설계 결정] 메인 포트(8080)와 분리한 이유:
  # /actuator/**를 8080에 두면 SecurityConfig의 anyRequest().authenticated()에 걸려
  # Prometheus가 인증 없이 스크래핑할 수 없음.
  # permitAll로 뚫으면 actuator 전체가 외부에 노출되는 보안 위험.
  # 실무에서도 actuator는 internal 포트로만 여는 패턴.
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, circuitbreakers
        # env, beans 제외 이유: 서버 내부 구조(환경변수, 빈 목록) 노출 → 불필요한 보안 위험
  metrics:
    export:
      prometheus:
        enabled: true

resilience4j:
  # CB(outer=order 1) → Retry(inner=order 2): Retry가 재시도를 소진한 뒤 CB가 fallback 처리
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      tosspayments:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    retryAspectOrder: 2
    instances:
      tosspayments:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - com.project.payflow.domain.payment.toss.exception.TossPaymentsServerException
        ignoreExceptions:
          - com.project.payflow.domain.payment.toss.exception.TossPaymentsClientException
          - com.project.payflow.domain.payment.toss.exception.PaymentAlreadyApprovedException
