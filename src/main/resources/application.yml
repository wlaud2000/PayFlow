spring:
  config:
    import: classpath:/yaml/
  profiles:
    group:
      logging-dev: dev, log
      logging-local: local, log
      logging-test: test, log
    active: ${SPRING_PROFILES_ACTIVE:local}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

resilience4j:
  # CB(outer=order 1) → Retry(inner=order 2): Retry가 재시도를 소진한 뒤 CB가 fallback 처리
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      tosspayments:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    retryAspectOrder: 2
    instances:
      tosspayments:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - com.project.payflow.domain.payment.toss.exception.TossPaymentsServerException
        ignoreExceptions:
          - com.project.payflow.domain.payment.toss.exception.TossPaymentsClientException
          - com.project.payflow.domain.payment.toss.exception.PaymentAlreadyApprovedException
