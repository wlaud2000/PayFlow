# Prometheus: Spring Boot 메트릭 수집 (8081/actuator/prometheus 15초마다 scrape)
# Grafana: 수집된 메트릭 시각화 (localhost:3000, admin/admin)
# extra_hosts: 컨테이너에서 호스트 Spring Boot(8081)로 접근하기 위한 설정
#             Mac/Windows/Linux 플랫폼 무관하게 host.docker.internal로 통일

services:
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana:/etc/grafana/dashboards
    depends_on:
      - prometheus

  wiremock:
    image: wiremock/wiremock:3.3.1
    ports:
      - "8888:8080"
    volumes:
      - ./load-test/wiremock:/home/wiremock
